name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    outputs:
      artifact_name: ${{ steps.package.outputs.artifact_name }}
      archive_name: ${{ steps.package.outputs.archive_name }}
      version: ${{ steps.package.outputs.version }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download AutoHotkey v1
        shell: pwsh
        run: |
          $version = "1.1.37.02"
          $expectedHash = "6F3663F7CDD25063C8C8728F5D9B07813CED8780522FD1F124BA539E2854215F"
          $archive = Join-Path $env:RUNNER_TEMP "AutoHotkey_$version.zip"
          $installDirectory = Join-Path $env:RUNNER_TEMP "AutoHotkey_$version"
          $url = "https://github.com/AutoHotkey/AutoHotkey/releases/download/v$version/AutoHotkey_$version.zip"

          Invoke-WebRequest -Uri $url -OutFile $archive
          $actualHash = (Get-FileHash -LiteralPath $archive -Algorithm SHA256).Hash
          if ($actualHash -ne $expectedHash) {
            throw "AutoHotkey archive checksum mismatch: $actualHash"
          }

          Expand-Archive -LiteralPath $archive -DestinationPath $installDirectory -Force
          $compiler = Join-Path $installDirectory "Compiler\Ahk2Exe.exe"
          if (-not (Test-Path -LiteralPath $compiler -PathType Leaf)) {
            throw "Ahk2Exe was not found after extracting AutoHotkey."
          }
          "AHK2EXE=$compiler" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build package
        shell: pwsh
        env:
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
        run: |
          $arguments = @("-CompilerPath", $env:AHK2EXE)
          if ($env:REF_TYPE -eq "tag") {
            $arguments += @("-Version", $env:REF_NAME)
          }
          & .\scripts\build.ps1 @arguments

      - name: Resolve artifact version
        id: package
        shell: pwsh
        env:
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
        run: |
          $archives = @(Get-ChildItem -LiteralPath "dist" -Filter "D3keyHelper-v*-windows-x64.zip")
          if ($archives.Count -ne 1) {
            throw "Expected exactly one versioned package, found $($archives.Count)."
          }
          $versionInfo = (Get-Item -LiteralPath "dist\D3keyHelper.exe").VersionInfo
          $fileVersion = $versionInfo.FileVersion
          $productVersion = $versionInfo.ProductVersion
          if ($env:REF_TYPE -eq "tag") {
            if ($env:REF_NAME -notmatch '^v\d+\.\d+\.\d+\.\d+$') {
              throw "Release tags must use vMAJOR.MINOR.BUILD.REVISION, for example v1.4.2026.718."
            }
            $expectedVersion = $env:REF_NAME.Substring(1)
            if ($fileVersion -ne $expectedVersion) {
              throw "EXE version '$fileVersion' does not match tag '$env:REF_NAME'."
            }
            if ($productVersion -ne $expectedVersion) {
              throw "Product version '$productVersion' does not match tag '$env:REF_NAME'."
            }
            $expectedArchive = "D3keyHelper-$($env:REF_NAME)-windows-x64.zip"
            if ($archives[0].Name -ne $expectedArchive) {
              throw "Archive '$($archives[0].Name)' does not match expected '$expectedArchive'."
            }
          }
          "BUILD_ARTIFACT=$($archives[0].BaseName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "artifact_name=$($archives[0].BaseName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "archive_name=$($archives[0].Name)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "version=$fileVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BUILD_ARTIFACT }}
          path: |
            dist/D3keyHelper.exe
            dist/D3keyHelper-v*-windows-x64.zip
          if-no-files-found: error
          retention-days: 14

  release:
    if: github.ref_type == 'tag'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download release package
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact_name }}
          path: release

      - name: Create GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          ARCHIVE_NAME: ${{ needs.build.outputs.archive_name }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" \
              "release/D3keyHelper.exe" \
              "release/$ARCHIVE_NAME" \
              --clobber
          else
            gh release create "$GITHUB_REF_NAME" \
              "release/D3keyHelper.exe" \
              "release/$ARCHIVE_NAME" \
              --verify-tag \
              --generate-notes \
              --title "D3KeyHelper $GITHUB_REF_NAME"
          fi
